name: Builder images

on:
  push:
    branches: [main]
    paths:
      - 'dockerfiles/**'
      - 'make-new-image'
      - 'Makefile'
      - 'scripts/ci-setup-workspace.sh'
      - 'scripts/ci-pull-builder-images.sh'
      - '.github/workflows/builder-images.yml'
  pull_request:
    branches: [main]
    paths:
      - 'dockerfiles/**'
      - 'make-new-image'
      - 'Makefile'
      - 'scripts/ci-setup-workspace.sh'
      - 'scripts/ci-pull-builder-images.sh'
      - '.github/workflows/builder-images.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/dockershelf/dockershelf-python-builder

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout python-pipeline
        uses: actions/checkout@v4
        with:
          path: python-pipeline

      - name: Checkout reference py repo
        uses: actions/checkout@v4
        with:
          repository: Dockershelf/py3.13
          path: py3.13
          sparse-checkout: |
            debiandirs

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate Dockerfiles
        working-directory: python-pipeline
        run: make generate-dockerfiles

      - name: Build tools image
        uses: docker/build-push-action@v6
        with:
          context: python-pipeline/dockerfiles
          file: python-pipeline/dockerfiles/Dockerfile.tools
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/tools:latest
            ${{ env.IMAGE_PREFIX }}/tools:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build trixie builder image
        uses: docker/build-push-action@v6
        with:
          context: python-pipeline/dockerfiles
          file: python-pipeline/dockerfiles/Dockerfile.trixie
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/trixie:latest
            ${{ env.IMAGE_PREFIX }}/trixie:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build unstable builder image
        uses: docker/build-push-action@v6
        with:
          context: python-pipeline/dockerfiles
          file: python-pipeline/dockerfiles/Dockerfile.unstable
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/unstable:latest
            ${{ env.IMAGE_PREFIX }}/unstable:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
