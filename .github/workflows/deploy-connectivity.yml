name: Deploy connectivity

on:
  workflow_dispatch:

jobs:
  connectivity:
    if: secrets.DEPLOY_SSH_KEY != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout python-pipeline
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            scripts

      - name: Deploy preflight
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
          DEPLOY_INCOMING: ${{ vars.DEPLOY_INCOMING }}
        run: bash scripts/ci-deploy-preflight.sh

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Verify SSH and incoming directory
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          DEPLOY_INCOMING: ${{ vars.DEPLOY_INCOMING }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          bash scripts/ci-deploy-preflight.sh --connectivity

  deploy-not-configured:
    if: secrets.DEPLOY_SSH_KEY == ''
    runs-on: ubuntu-latest
    steps:
      - name: Missing deploy secret
        run: |
          echo "DEPLOY_SSH_KEY is not configured. See docs/deploy-setup.md." >&2
          exit 1
