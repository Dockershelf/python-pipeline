name: Publish

on:
  workflow_run:
    workflows: [Update meta-gbp]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      dist:
        description: Debian suite (trixie or unstable)
        required: true
        type: choice
        options:
          - trixie
          - unstable
      arch:
        description: Architecture
        required: false
        type: choice
        default: amd64
        options:
          - amd64
          - arm64
      run_id:
        description: Packaging workflow run ID to download artifacts from (leave empty to use dist/ fallback)
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      ARCH: ${{ github.event_name == 'workflow_dispatch' && inputs.arch || 'amd64' }}
    steps:
      - name: Require deploy configuration
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
        run: |
          if [[ -z "$DEPLOY_HOST" ]]; then
            echo "DEPLOY_HOST is not configured. See docs/deploy-setup.md." >&2
            exit 1
          fi

      - name: Checkout python-pipeline
        uses: actions/checkout@v4

      - name: Resolve dist and run ID
        id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
            # workflow_run doesn't carry dist input; default to unstable
            echo "dist=unstable" >> "$GITHUB_OUTPUT"
          else
            echo "run_id=${{ inputs.run_id }}" >> "$GITHUB_OUTPUT"
            echo "dist=${{ inputs.dist }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download debs from packaging run
        if: ${{ steps.resolve.outputs.run_id != '' }}
        uses: actions/download-artifact@v4
        with:
          name: debs-${{ steps.resolve.outputs.dist }}-${{ env.ARCH }}
          path: dist
          run-id: ${{ steps.resolve.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify dist artifacts
        run: |
          shopt -s nullglob
          debs=(dist/*.deb)
          if [[ ${#debs[@]} -eq 0 ]]; then
            echo "No dist/*.deb found. Provide run_id input or upload debs to dist/ manually." >&2
            exit 1
          fi
          ls -la dist/*.deb

      - name: Deploy preflight
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
          DEPLOY_INCOMING: ${{ vars.DEPLOY_INCOMING }}
        run: bash scripts/ci-deploy-preflight.sh

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Publish to APT droplet
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
          DEPLOY_INCOMING: ${{ vars.DEPLOY_INCOMING }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          bash scripts/ci-publish.sh "${{ steps.resolve.outputs.dist }}" dist "${{ env.ARCH }}"
