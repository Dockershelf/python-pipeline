name: Publish

on:
  workflow_dispatch:
    inputs:
      dist:
        description: Debian suite (trixie or unstable)
        required: true
        type: choice
        options:
          - trixie
          - unstable

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Require deploy configuration
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
        run: |
          if [[ -z "$DEPLOY_HOST" ]]; then
            echo "DEPLOY_HOST is not configured. See docs/deploy-setup.md." >&2
            exit 1
          fi

      - name: Checkout python-pipeline
        uses: actions/checkout@v4

      - name: Verify dist artifacts
        run: |
          shopt -s nullglob
          debs=(dist/*.deb)
          if [[ ${#debs[@]} -eq 0 ]]; then
            echo "No dist/*.deb in workspace. Upload debs to dist/ or re-run packaging workflow." >&2
            exit 1
          fi
          ls -la dist/*.deb

      - name: Deploy preflight
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
          DEPLOY_INCOMING: ${{ vars.DEPLOY_INCOMING }}
        run: bash scripts/ci-deploy-preflight.sh

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Publish to APT droplet
        env:
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
          DEPLOY_INCOMING: ${{ vars.DEPLOY_INCOMING }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          bash scripts/ci-publish.sh "${{ inputs.dist }}" dist
