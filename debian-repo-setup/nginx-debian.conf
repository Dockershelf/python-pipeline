# Nginx server block for Dockershelf APT repository
#
# Install on the DigitalOcean droplet:
#   sudo cp nginx-debian.conf /etc/nginx/sites-available/dockershelf-apt
#   sudo ln -s /etc/nginx/sites-available/dockershelf-apt /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace apt.dockershelf.example with your hostname. Terminate TLS with certbot.

server {
    listen 80;
    listen [::]:80;
    server_name apt.dockershelf.example;

    root /var/www/debian;
    index index.html;

    # APT pool and indices only; no directory listing of internal paths.
    location / {
        autoindex off;
        try_files $uri $uri/ =404;
    }

    location /dists/ {
        autoindex off;
    }

    location /pool/ {
        autoindex off;
    }

    # Optional: allow only GET/HEAD for clients.
    limit_except GET HEAD {
        deny all;
    }
}

# After certbot:
# server {
#     listen 443 ssl http2;
#     listen [::]:443 ssl http2;
#     server_name apt.dockershelf.example;
#     ...
# }
