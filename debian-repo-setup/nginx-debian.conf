# Nginx server block for Dockershelf APT repository
#
# Prefer bootstrap-droplet.sh, which writes /etc/nginx/sites-available/dockershelf-apt.
# Manual install:
#   sudo cp nginx-debian.conf /etc/nginx/sites-available/dockershelf-apt
#   sudo ln -sf /etc/nginx/sites-available/dockershelf-apt /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d apt.dockershelf.com

server {
    listen 80;
    listen [::]:80;
    server_name apt.dockershelf.com;

    # Repository files live on disk at /var/www/debian; exposed under /dockershelf/.
    location /dockershelf/ {
        alias /var/www/debian/;
        autoindex off;
        limit_except GET HEAD {
            deny all;
        }
    }
}

